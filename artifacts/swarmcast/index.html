<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary meta -->
    <title>SwarmCast — AI Focus Group Simulator powered by ElevenLabs</title>
    <meta name="description" content="Paste any announcement and hear how 25 distinct AI personas react — in their own unique voices. SwarmCast gives you an AI focus group with karaoke transcripts, sentiment analysis, and a conversational swarm agent before you publish." />
    <meta name="keywords" content="AI focus group, public sentiment simulator, ElevenLabs, voice AI, persona simulation, announcement testing, sentiment analysis, SwarmCast" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="SwarmCast" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SwarmCast" />
    <meta property="og:title" content="SwarmCast — AI Focus Group Simulator powered by ElevenLabs" />
    <meta property="og:description" content="Paste any announcement and hear how 25 distinct AI personas react in their own voices. Get sentiment analysis, karaoke transcripts, and a conversational swarm agent — before you publish." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SwarmCast — 25 AI voices react to your announcement" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SwarmCast — AI Focus Group Simulator" />
    <meta name="twitter:description" content="Paste any announcement. Hear 25 distinct AI voices react — with karaoke transcripts, sentiment scores, and a conversational swarm agent. Powered by ElevenLabs." />
    <meta name="twitter:image" content="/opengraph.jpg" />
    <meta name="twitter:image:alt" content="SwarmCast — 25 AI voices react to your announcement" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#c8903a" />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SwarmCast",
      "description": "AI-powered public sentiment simulator. Paste any announcement and hear how 25 distinct AI personas react in their own unique voices, with karaoke transcripts, sentiment forecasting, and a conversational swarm agent.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "25 demographically diverse AI personas",
        "ElevenLabs Voice Design API for unique voices",
        "Karaoke-style transcript with forced alignment",
        "Sentiment analysis and forecasting",
        "Conversational swarm agent (ElevenLabs ConvAI)",
        "Mood-adaptive sound theme via Sound Effects API",
        "Prescriptive content improvement suggestions",
        "Live web fact-checking"
      ],
      "keywords": "AI focus group, public sentiment, ElevenLabs, voice AI, announcement testing"
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
